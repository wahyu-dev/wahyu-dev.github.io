<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Footbal App</title>
    <meta name="description" content="Football app" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/png" href="./img/icon.png" />
    <link rel="apple-touch-icon" href="./img/icon.png" />
    <link rel="stylesheet" href="css/materialize.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00897B" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <!-- Navigasi -->
    <nav class="light-blue" role="navigation">
        <div class="nav-wrapper container">
            <a href="./index.html" class="brand-logo" id="logo-container"><i
                    class="material-icons">arrow_back</i>Apps</a>
            <ul class="topnav right hide-on-med-and-down"></ul>
            <ul class="sidenav" id="nav-mobile"></ul>
        </div>
    </nav>
    <!-- Akhir Navigasi -->


    <br>
    <div class="container" id="body-content">
        <h3 class="header center blue-text">Team Information</h3>

        <!-- Loader -->
        <div class="center" id="progress1" style="margin-top:15%">
            <div class="preloader-wrapper big active">
                <div class="spinner-layer spinner-blue-only">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- End Loader -->
        <div class="card">
            <div class="row">
                <div class="col s12 m6" id="image"></div>
                <div class="col s12 m6" id="content"></div>
            </div>
        </div>
        <h3 class="header center blue-text">Squad Information</h3>
        <!-- Loader -->
        <div class="center" id="progress2" style="margin-top:15%">
            <div class="preloader-wrapper big active">
                <div class="spinner-layer spinner-blue-only">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- End Loader -->
        <div class="card" style="padding-left: 24px; padding-right: 24px; margin-top: 30px;">
            <div class="row" id="squad"></div>
        </div>
    </div>

    <div class="fixed-action-btn">
        <a class="btn-floating btn-large red" id="save">
            <i class="large material-icons">save</i>
        </a>
    </div>


    <script type="text/javascript" src="https://unpkg.com/snarkdown@1.0.2/dist/snarkdown.umd.js"></script>
    <script src="js/materialize.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/idb.js"></script>
    <script src="js/db.js"></script>
    <script src="js/sw-register.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            let urlParams = new URLSearchParams(window.location.search);
            let isFromSaved = urlParams.get("saved");

            let save = document.getElementById("save");
            let item;
            if (isFromSaved) {
                save.style.display = 'none';

                getSavedTeamById();
            } else {
                item = getTeamById();
            }

            save.onclick = () => {
                console.log("Tombol FAB di klik.");
                item.then(team => {
                    saveForLater(team);
                });
            }
        });
    </script>
</body>

</html>
